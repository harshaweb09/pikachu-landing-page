    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <meta
      name="description"
      content="Pikachu landing page built using HTML and CSS with Flexbox, relative positioning, and absolute positioning."

      property="og:title"
      content="Pikachu Landing Page | HTML & CSS Project"

    <meta
      property="og:description"
      content="Pokémon inspired landing page created using HTML and CSS."
    />
    <meta
      property="og:url"
      content="https://harshaweb09.github.io/pikachu-landing-page/"

  <body>
    <div class="outer">
      <main>
        <section class="left">
          <h1>POKEMON GEN I</h1>
          <h2>Pikachu</h2>
          <p>
            Pikachu is an Electric-type Pokémon introduced in Generation
            I.Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>
          <br />
          <div class="date">
            <div class="line"></div>
            <span> 01 / 08</span>
          </div>
        </section>
        <section class="right"></section>
        <img class="logo" width="200" src="./logo.png" alt="logo" />
        <img class="pickachu" width="600" src="./pickachu.png" alt="pickachu" />
        <img class="menu" width="35" height="35" src="./menu.png" alt="menu" />
        <img
          class="ball"
          width="240"
          height="160"
          src="./ball.png"
          alt="pokeball"
        />
        <div class="dots">
          <div class="dot dot1"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </main>
    </div>
